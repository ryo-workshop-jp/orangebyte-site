<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrangeByte | Personal Development Lab</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="top-shell">
    <div class="top-browser-bar"></div>
    <header class="site-header container">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>OrangeByte</span>
      </a>
      <nav class="nav">
        <a href="/apps/">Apps</a>
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
      </nav>
    </header>
  </div>

  <main class="container">
    <section class="hero hero-center">
      <h1>OrangeByte</h1>
      <p class="subhead">Personal Development Lab</p>
      <p class="lead">個人開発のアプリやAIツールを公開しています。</p>
      <a class="btn btn-primary" href="/apps/">Appsを見る</a>
    </section>

    <section class="section-block" id="apps">
      <h2 class="section-title">Apps</h2>
      <p class="lead">アプリ一覧と、各アプリの使い方ページへ移動できます。</p>
      <a class="text-link" href="/apps/">アプリ一覧へ</a>
    </section>

    <section class="section-block" id="blog">
      <h2 class="section-title">Blog</h2>
      <p class="lead">開発ログと技術記事をカテゴリ別にまとめています。</p>
      <a class="text-link" href="/blog/">ブログ一覧へ</a>
    </section>

    <section class="section-block" id="about">
      <h2 class="section-title">About</h2>
      <p class="lead">サイト運営方針とプロフィールの最小情報を掲載しています。</p>
      <a class="text-link" href="/about/">Aboutページへ</a>
    </section>
  </main>

  <footer class="site-footer container">
    <p>© 2026 OrangeByte</p>
  </footer>
</body>
</html>
